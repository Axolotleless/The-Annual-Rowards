<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The 2026 Annual Rowards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --game-pink: #ff3b7c; 
            --game-pink-hover: #e02a63;
            --ui-bg: #f39c12;
            --ui-border: 4px solid #ffffff;
            --ui-radius: 12px;
            --text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.4);
        }
        
        body {
            margin: 0; 
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #fdf3d0;
            display: flex; 
            justify-content: center;
            align-items: center; 
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            z-index: -1; 
            
            /* Uses a 40% opacity version of your UI orange for a perfect match */
            background-color: rgba(243, 156, 18, 0.4); 
            
            -webkit-mask-image: url('background.png');
            -webkit-mask-repeat: repeat;
            -webkit-mask-size: 250px 250px;
            mask-image: url('background.png');
            mask-repeat: repeat;
            mask-size: 250px 250px;
        }
        
        .container {
            width: 90%; 
            max-width: 500px; 
            background: var(--ui-bg);
            border: var(--ui-border); 
            border-radius: var(--ui-radius);
            padding: 35px 25px; 
            text-align: center;
            color: white;
            text-shadow: var(--text-shadow);
            box-sizing: border-box;
            box-shadow: 0px 8px 15px rgba(0,0,0,0.1);
        }
        
        h1 { 
            font-weight: 900; 
            text-transform: uppercase; 
            color: #ffffff; 
            margin-top: 0;
            margin-bottom: 5px; 
            font-size: 2.2rem;
            letter-spacing: 1px;
            text-shadow: 3px 3px 0px rgba(0, 0, 0, 0.2);
        }
        
        .progress { 
            font-size: 1rem; 
            color: #ffffff; 
            margin-bottom: 25px; 
            font-weight: 700;
        }
        
        .category-title { 
            font-size: 1.6rem; 
            font-weight: 900; 
            margin: 20px 0; 
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            width: 100%; 
            padding: 15px; 
            font-family: inherit; 
            font-size: 1.1rem;
            font-weight: 700;
            background: rgba(0, 0, 0, 0.2); 
            border: var(--ui-border);
            border-radius: var(--ui-radius); 
            color: white; 
            outline: none; 
            text-shadow: var(--text-shadow);
            text-align: center;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.8);
        }
        
        input:focus { 
            border-color: #ffffff; 
            background: rgba(0, 0, 0, 0.4); 
            transform: scale(1.02);
        }
        
        .buttons { 
            display: flex; 
            gap: 15px; 
            justify-content: center;
            width: 100%;
        }
        
        button {
            flex: 1; 
            padding: 16px; 
            font-family: inherit; 
            font-size: 1.1rem;
            font-weight: 900;
            text-transform: uppercase; 
            border-radius: var(--ui-radius); 
            cursor: pointer; 
            transition: all 0.15s ease;
            text-shadow: var(--text-shadow);
        }

        button:disabled {
            background: rgba(0, 0, 0, 0.3) !important;
            color: rgba(255, 255, 255, 0.6);
            cursor: not-allowed;
            transform: none !important;
            text-shadow: none;
            font-size: 0.95rem;
        }
        
        .btn-back { 
            background: rgba(0,0,0,0.2); 
            border: var(--ui-border); 
            color: white; 
        }
        
        .btn-back:hover:not(:disabled) { 
            background: rgba(0, 0, 0, 0.4); 
            transform: scale(1.05);
        }
        
        .btn-next { 
            background: var(--game-pink); 
            border: var(--ui-border); 
            color: white; 
        }
        
        .btn-next:hover:not(:disabled) { 
            background: var(--game-pink-hover); 
            transform: scale(1.05);
        }
        
        .hidden { display: none !important; }
        
        #success-message { 
            color: #ffffff; 
            font-weight: 900; 
            font-size: 1.3rem; 
            margin-top: 20px;
        }
        
        #error-message {
            font-family: monospace !important; 
            background: rgba(255, 0, 0, 0.2) !important;
            color: white !important; 
            border: var(--ui-border) !important; 
            border-color: #ff4444 !important;
            padding: 20px !important; 
            text-align: left !important; 
            font-size: 14px !important;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-top: 20px;
            text-shadow: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>The Rowards</h1>
    <div class="progress" id="progress"></div>

    <div id="wizard">
        <div class="category-title" id="title"></div>
        <div class="input-group">
            <input type="text" id="input1" placeholder="1st Choice Nomination...">
            <input type="text" id="input2" placeholder="2nd Choice Nomination...">
            <input type="text" id="input3" placeholder="3rd Choice Nomination...">
        </div>
        <div class="buttons">
            <button class="btn-back" id="backBtn">Back</button>
            <button class="btn-next" id="nextBtn">Next</button>
        </div>
    </div>

    <div id="success-message" class="hidden">Nominations secured!<br><br>Thanks for taking the time to submit.</div>
    <div id="error-message" class="hidden"></div>
</div>

<script>
    const WORKER_URL = "https://awards-database.acc943132.workers.dev";
    
    const START_DATE = new Date("2026-07-16T00:00:00Z").getTime(); 
    const MS_PER_REVEAL = 3 * 24 * 60 * 60 * 1000;

    const GEO_API_URL = "https://freeipapi.com/api/json/";

    const TIME_API_CANDIDATES = [
        {
            name: "timeapi.io",
            url: "https://timeapi.io/api/Time/current/zone?timeZone=Etc/UTC",
            parse: (d) => new Date(d.dateTime + "Z").getTime()
        },
        {
            name: "time.now",
            url: "https://time.now/developer/api/timezone/UTC",
            parse: (d) => new Date(d.utc_datetime || d.datetime).getTime()
        }
    ];
    const FETCH_TIMEOUT_MS = 4000;
    const MAX_CLOCK_DRIFT_MS = 5 * 60 * 1000;
    let trustedOffset = 0;

    function trustedNow() {
        return Date.now() + trustedOffset;
    }

    async function fetchWithTimeout(url, ms) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), ms);
        try {
            const res = await fetch(url, { signal: controller.signal });
            return await res.json();
        } finally {
            clearTimeout(timer);
        }
    }

    async function detectLocation() {
        try {
            const data = await fetchWithTimeout(GEO_API_URL, FETCH_TIMEOUT_MS);
            return {
                country: data.countryName || null,
                timezone: (data.timeZones && data.timeZones[0]) || null
            };
        } catch (e) {
            return { country: null, timezone: null };
        }
    }

    async function initTrustedTime() {
        const location = await detectLocation();

        for (const candidate of TIME_API_CANDIDATES) {
            try {
                const data = await fetchWithTimeout(candidate.url, FETCH_TIMEOUT_MS);
                const serverTime = candidate.parse(data);
                if (!serverTime || isNaN(serverTime)) continue;

                const drift = serverTime - Date.now();

                if (Math.abs(drift) > MAX_CLOCK_DRIFT_MS) {
                    let whatItShouldBe = "";
                    if (location.timezone) {
                        try {
                            const local = new Intl.DateTimeFormat("en-US", {
                                timeZone: location.timezone,
                                dateStyle: "medium",
                                timeStyle: "medium"
                            }).format(new Date(serverTime));
                            whatItShouldBe = ` It should currently read about ${local}${location.country ? ` (${location.country} time)` : ""}.`;
                        } catch (e) {}
                    }

                    triggerError(`Device date/time doesn't match the actual current time.\nDetected drift: ${Math.round(drift / 1000)}s.${whatItShouldBe}\n\nTurn your device's "set time automatically" option off then back on (or correct it manually) and reload this page.`);
                    return false;
                }

                trustedOffset = drift;
                return true;
            } catch (e) {
                continue;
            }
        }

        trustedOffset = 0;
        return true;
    }


    const cats = [
        "Game of the Year", "Group of the Year", "Creator of the Year", "Best Sleeper Hit", 
        "Best Classics", "Most Immersive Experience", "Most Fun Game", "Best Live Event", 
        "Mobile Game of the Year", "Console Game of the Year", "Best Use of Tech", 
        "Best Use of Audio", "Best New Game", "Best Showcase", "Best Game Trailer", 
        "Roblox Video of the Year", "Best Video Content Creator"
    ];

    let i = 0;
    let noms = {};
    let countdownTimer;
    
    const els = {
        title: document.getElementById("title"), 
        input1: document.getElementById("input1"),
        input2: document.getElementById("input2"),
        input3: document.getElementById("input3"),
        prog: document.getElementById("progress"), 
        back: document.getElementById("backBtn"),
        next: document.getElementById("nextBtn"), 
        wiz: document.getElementById("wizard"),
        succ: document.getElementById("success-message"), 
        err: document.getElementById("error-message")
    };

    (async function init() {
        if (localStorage.getItem("rowards_nom")) {
            triggerError("Local cache indicates prior submission. axowebservers block multi-casting.");
            return;
        }

        const clockOk = await initTrustedTime();
        if (!clockOk) return;

        const draft = localStorage.getItem("rowards_draft");
        if (draft) noms = JSON.parse(draft);
        update();
    })();

    els.back.onclick = () => { 
        if (i > 0) { 
            save(); 
            i--; 
            update(); 
        } 
    };
    
    els.next.onclick = () => { 
        save(); 
        if (i < cats.length - 1) {
            i++;
            update();
        } else {
            submit();
        }
    };

    function getUnlockedCount() {
        const now = trustedNow();
        if (now < START_DATE) return 1;
        let count = Math.floor((now - START_DATE) / MS_PER_REVEAL) + 1;
        return Math.min(count, cats.length);
    }

    function getNextUnlockTime() {
        const unlocked = getUnlockedCount();
        return START_DATE + (unlocked * MS_PER_REVEAL);
    }

    function update() {
        clearInterval(countdownTimer);
        const unlockedCount = getUnlockedCount();

        els.title.textContent = cats[i];
        els.prog.textContent = `Category ${i + 1} / ${cats.length}`;
        
        const currentNoms = noms[cats[i]] || ["", "", ""];
        els.input1.value = currentNoms[0] || "";
        els.input2.value = currentNoms[1] || "";
        els.input3.value = currentNoms[2] || "";
        
        els.back.style.display = i === 0 ? "none" : "block";
        
        if (i < unlockedCount - 1) {
            els.next.disabled = false;
            els.next.textContent = "Next";
        } else if (i === cats.length - 1 && unlockedCount === cats.length) {
            els.next.disabled = false;
            els.next.textContent = "Submit";
        } else {
            els.next.disabled = true;
            tickCountdown();
            countdownTimer = setInterval(tickCountdown, 1000);
        }

        els.input1.focus();
    }

    function tickCountdown() {
        const now = trustedNow();
        const nextUnlock = getNextUnlockTime();
        const diff = nextUnlock - now;

        if (diff <= 0) {
            clearInterval(countdownTimer);
            update();
            return;
        }

        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);

        els.next.textContent = `Unlocks in ${d}d ${h}h ${m}m ${s}s`;
    }

    function save() {
        const val1 = els.input1.value.trim();
        const val2 = els.input2.value.trim();
        const val3 = els.input3.value.trim();
        
        if (val1 || val2 || val3) {
            noms[cats[i]] = [val1, val2, val3]; 
        } else {
            delete noms[cats[i]];
        }
        
        localStorage.setItem("rowards_draft", JSON.stringify(noms));
    }

    async function submit() {
        els.next.disabled = true; 
        els.next.textContent = "Working...";
        
        const payload = Object.keys(noms).map(k => ({ c: k, l: noms[k] }));

        try {
            const res = await fetch(WORKER_URL, { 
                method: "POST", 
                body: JSON.stringify(payload),
                headers: { "Content-Type": "application/json" }
            });
            
            if (res.ok) {
                localStorage.setItem("rowards_nom", "1");
                localStorage.removeItem("rowards_draft");
                els.wiz.classList.add("hidden"); 
                els.prog.classList.add("hidden");
                els.succ.classList.remove("hidden");
            } else {
                const err = await res.json();
                triggerError(err.error || "Remote axowebservers rejected payload without a fault code.");
            }
        } catch (e) {
            triggerError("Network dropped. axowebservers unreachable. Check connection or adblocker restrictions.");
        }
        
        els.next.disabled = false; 
        if(i === cats.length - 1) els.next.textContent = "Submit";
    }

    function triggerError(detail) {
        els.wiz.classList.add("hidden"); 
        els.prog.classList.add("hidden");
        els.err.classList.remove("hidden");
        els.err.textContent = `[AXOWEBSERVERS - FATAL FAULT]\nStatus: Connection severed.\nDetails: ${detail}`;
    }
</script>
</body>
</html>
